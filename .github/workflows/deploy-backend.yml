name: Deploy Backend to Cloud Run

on:
  push:
      branches: [main]
          paths:
                - 'backend/**'
                  workflow_dispatch:

                  env:
                    PROJECT_ID: project-d0118f2c-58f4-4081-864
                      SERVICE: econojabis-backend
                        REGION: us-central1
                          SA_EMAIL: econojabis-vertex@project-d0118f2c-58f4-4081-864.iam.gserviceaccount.com
                            REGISTRY: us-central1-docker.pkg.dev
                              REPO: econojabis-backend

                              jobs:
                                deploy:
                                    name: Deploy to Cloud Run
                                        runs-on: ubuntu-latest
                                            permissions:
                                                  contents: read
                                                        id-token: write

                                                            steps:
                                                                  - name: Checkout
                                                                          uses: actions/checkout@v4

                                                                                - name: Authenticate to Google Cloud
                                                                                        id: auth
                                                                                                uses: google-github-actions/auth@v2
                                                                                                        with:
                                                                                                                  workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
                                                                                                                            service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
                                                                                                                                      token_format: access_token
                                                                                                                                      
                                                                                                                                            - name: Set up Cloud SDK
                                                                                                                                                    uses: google-github-actions/setup-gcloud@v2
                                                                                                                                                    
                                                                                                                                                          - name: Login to Artifact Registry
                                                                                                                                                                  uses: docker/login-action@v3
                                                                                                                                                                          with:
                                                                                                                                                                                    registry: us-central1-docker.pkg.dev
                                                                                                                                                                                              username: oauth2accesstoken
                                                                                                                                                                                                        password: ${{ steps.auth.outputs.access_token }}
                                                                                                                                                                                                        
                                                                                                                                                                                                              - name: Build and Push Docker image
                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:latest
                                                                                                                                                                                                                                          docker build -t $IMAGE ./backend
                                                                                                                                                                                                                                                    docker push $IMAGE
                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                          - name: Deploy to Cloud Run
                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                            IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:latest
                                                                                                                                                                                                                                                                                      gcloud run deploy ${{ env.SERVICE }} \
                                                                                                                                                                                                                                                                                                  --image $IMAGE \
                                                                                                                                                                                                                                                                                                              --region ${{ env.REGION }} \
                                                                                                                                                                                                                                                                                                                          --platform managed \
                                                                                                                                                                                                                                                                                                                                      --allow-unauthenticated \
                                                                                                                                                                                                                                                                                                                                                  --service-account ${{ env.SA_EMAIL }} \
                                                                                                                                                                                                                                                                                                                                                              --memory 512Mi \
                                                                                                                                                                                                                                                                                                                                                                          --cpu 1 \
                                                                                                                                                                                                                                                                                                                                                                                      --max-instances 3 \
                                                                                                                                                                                                                                                                                                                                                                                                  --project ${{ env.PROJECT_ID }}
                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                        - name: Get Cloud Run URL
                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                          URL=$(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --format 'value(status.url)' --project ${{ env.PROJECT_ID }})
                                                                                                                                                                                                                                                                                                                                                                                                                                    echo "Cloud Run URL: $URL"
